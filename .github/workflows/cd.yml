name: CD

on:
  push:
    branches: [develop]
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io/jcrlabs
  IMAGE: inventory-front

jobs:
  deploy-test:
    name: Deploy → test
    if: >
      github.ref == 'refs/heads/develop' &&
      !startsWith(github.event.head_commit.message, 'chore: update test image')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (develop-SHA)
        run: |
          SHA=$(git rev-parse --short HEAD)
          docker build -t $REGISTRY/$IMAGE:develop-$SHA .
          docker push $REGISTRY/$IMAGE:develop-$SHA
          echo "SHA=$SHA" >> $GITHUB_ENV

      - name: Update values-test.yaml
        run: |
          sed -i "s/tag: develop-.*/tag: develop-$SHA/" deploy/helm/values-test.yaml
          git config user.email "ci@jcrlabs.net"
          git config user.name "CI Bot"
          git add deploy/helm/values-test.yaml
          git diff --staged --quiet || git commit -m "chore: update test image to develop-$SHA"
          git push

  deploy-prod:
    name: Deploy → prod
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Set version from tag
        run: echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Checkout tagged source
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (${{ env.VERSION }})
        run: |
          docker build -t $REGISTRY/$IMAGE:$VERSION .
          docker push $REGISTRY/$IMAGE:$VERSION

      - name: Checkout main (to update values-prod.yaml)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-branch

      - name: Update values-prod.yaml
        working-directory: main-branch
        run: |
          sed -i "s/tag: .*/tag: $VERSION/" deploy/helm/values-prod.yaml
          git config user.email "ci@jcrlabs.net"
          git config user.name "CI Bot"
          git add deploy/helm/values-prod.yaml
          git diff --staged --quiet || git commit -m "chore: release $VERSION"
          git push

      - name: Verify rollout
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > /tmp/kc
          KUBECONFIG=/tmp/kc kubectl rollout status deployment/inventory-front \
            -n inventory --timeout=5m || \
          {
            echo "=== Rollout failed — pod diagnostics ==="
            KUBECONFIG=/tmp/kc kubectl get pods -n inventory -l app.kubernetes.io/name=inventory-front
            KUBECONFIG=/tmp/kc kubectl describe pods -n inventory -l app.kubernetes.io/name=inventory-front | tail -40
            KUBECONFIG=/tmp/kc kubectl get events -n inventory --sort-by='.lastTimestamp' | tail -20
            KUBECONFIG=/tmp/kc kubectl rollout undo deployment/inventory-front -n inventory
            exit 1
          }
