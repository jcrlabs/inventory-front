name: CD

on:
  push:
    branches: [main, develop]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io/jcrlabs
  IMAGE: inventory-front

# ─────────────────────────────────────────────────────────────────────────────
# Required GitHub secrets:
#   ARGOCD_SERVER  — ArgoCD server URL
#   ARGOCD_TOKEN   — ArgoCD API token
#   KUBECONFIG     — base64-encoded kubeconfig (only for rollout verify)
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  deploy-test:
    name: Deploy → test
    if: >
      github.ref == 'refs/heads/develop' &&
      !startsWith(github.event.head_commit.message, 'chore: update test image')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build (production)
        run: npm run build

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (develop-SHA)
        run: |
          SHA=$(git rev-parse --short HEAD)
          docker build -t $REGISTRY/$IMAGE:develop-$SHA .
          docker push $REGISTRY/$IMAGE:develop-$SHA
          echo "SHA=$SHA" >> $GITHUB_ENV

      - name: Update values-test.yaml
        run: |
          sed -i "s/tag: develop-.*/tag: develop-$SHA/" deploy/helm/values-test.yaml
          git config user.email "ci@jcrlabs.net"
          git config user.name "CI Bot"
          git add deploy/helm/values-test.yaml
          git diff --staged --quiet || git commit -m "chore: update test image to develop-$SHA"
          git push

      - name: ArgoCD sync (test namespace)
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
        run: |
          curl -sL https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64 \
            -o /usr/local/bin/argocd && chmod +x /usr/local/bin/argocd
          argocd app sync inventory-front-test \
            --server $ARGOCD_SERVER --auth-token $ARGOCD_TOKEN --grpc-web

  deploy-prod:
    name: Deploy → prod
    if: >
      github.ref == 'refs/heads/main' &&
      !startsWith(github.event.head_commit.message, 'chore: release v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build (production)
        run: npm run build

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        run: |
          VERSION="v$(cat VERSION)"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Build & push (${{ env.VERSION }})
        run: |
          docker build -t $REGISTRY/$IMAGE:$VERSION .
          docker push $REGISTRY/$IMAGE:$VERSION

      - name: Update values-prod.yaml + tag release
        run: |
          sed -i "s/tag: .*/tag: $VERSION/" deploy/helm/values-prod.yaml
          git config user.email "ci@jcrlabs.net"
          git config user.name "CI Bot"
          git add deploy/helm/values-prod.yaml
          git commit -m "chore: release $VERSION"
          git tag "$VERSION"
          git push
          git push --tags

      - name: ArgoCD sync (prod namespace)
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
        run: |
          curl -sL https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64 \
            -o /usr/local/bin/argocd && chmod +x /usr/local/bin/argocd
          argocd app sync inventory-front \
            --server $ARGOCD_SERVER --auth-token $ARGOCD_TOKEN --grpc-web

      - name: Verify rollout + auto-rollback
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > /tmp/kc
          KUBECONFIG=/tmp/kc kubectl rollout status deployment/inventory-front \
            -n inventory --timeout=5m || \
          {
            echo "=== Rollout failed — pod diagnostics ==="
            KUBECONFIG=/tmp/kc kubectl get pods -n inventory -l app.kubernetes.io/name=inventory-front
            KUBECONFIG=/tmp/kc kubectl describe pods -n inventory -l app.kubernetes.io/name=inventory-front | tail -40
            KUBECONFIG=/tmp/kc kubectl get events -n inventory --sort-by='.lastTimestamp' | tail -20
            KUBECONFIG=/tmp/kc kubectl rollout undo deployment/inventory-front -n inventory
            exit 1
          }
