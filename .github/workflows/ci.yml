name: CI

on:
  pull_request:
  push:
    branches: ["**"]

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Type checking ────────────────────────────────────────────────────────
      - name: TypeScript check
        run: npx tsc --noEmit

      # ── Linting ──────────────────────────────────────────────────────────────
      - name: ESLint
        run: npm run lint

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://invent-back.jcrlabs.net
