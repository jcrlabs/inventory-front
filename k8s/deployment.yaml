apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-front
  namespace: inventory
  labels:
    app: inventory-front
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-front
  template:
    metadata:
      labels:
        app: inventory-front
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: inventory-front
          # Image is updated by CI/CD via `kubectl set image`
          image: ghcr.io/jonathancaamano/inventory-front:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-front-service
  namespace: inventory
spec:
  selector:
    app: inventory-front
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: inventory-front-ingress
  namespace: inventory
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: inventory.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: inventory-front-service
                port:
                  number: 80
