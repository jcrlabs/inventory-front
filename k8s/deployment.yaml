apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-front
  namespace: taller-inventario
  labels:
    app: inventory-front
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-front
  template:
    metadata:
      labels:
        app: inventory-front
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: inventory-front
          # Image is updated by CI/CD via `kubectl set image`
          image: ghcr.io/jcrlabs/inventory-front:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-front-service
  namespace: taller-inventario
spec:
  selector:
    app: inventory-front
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: inventory-front-ingress
  namespace: taller-inventario
spec:
  ingressClassName: nginx
  rules:
    - host: tallerjcr.jcrlabs.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: inventory-front-service
                port:
                  number: 80
