<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="wrench-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <radialGradient id="bg-glow" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-f">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="#111111"/>
  <rect width="200" height="200" rx="40" fill="url(#bg-glow)"/>
  <rect x="1" y="1" width="198" height="198" rx="39"
        stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.18" fill="none"/>

  <!-- Wrench — bold, centered, clean -->
  <path d="M134 46a36 36 0 0 0-40.2 48.5L60 128.3A13 13 0 1 0 78.4 146.7l33.8-33.8A36 36 0 0 0 160.8 72.8l-20.8 20.8-14-14 20.8-20.8z"
        fill="url(#wrench-g)" filter="url(#glow-f)"/>
  <!-- Socket detail -->
  <circle cx="71" cy="137" r="8.5" fill="#7c2d12"/>
  <circle cx="71" cy="137" r="4.5" fill="#111" opacity="0.5"/>

  <!-- Subtle circuit nodes -->
  <circle cx="148" cy="52" r="4" fill="#fbbf24" opacity="0.35"/>
  <circle cx="158" cy="44" r="2.5" fill="#fbbf24" opacity="0.2"/>
  <line x1="152" y1="52" x2="158" y2="46" stroke="#fbbf24" stroke-width="1" opacity="0.2"/>
</svg>
