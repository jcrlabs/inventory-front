<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="iris-l" cx="40%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#1adff5"/>
      <stop offset="100%" stop-color="#007EA8"/>
    </radialGradient>
    <radialGradient id="iris-r" cx="40%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#1adff5"/>
      <stop offset="100%" stop-color="#007EA8"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="36" fill="#111111"/>
  <rect width="200" height="200" rx="36" fill="url(#bg)"/>
  <rect x="1" y="1" width="198" height="198" rx="35"
        stroke="#f59e0b" stroke-width="1" stroke-opacity="0.14" fill="none"/>

  <!-- ── GO GOPHER HEAD (geometric, proportional) ── -->
  <!-- Ears — same blue as head, inner shadow -->
  <ellipse cx="62" cy="72" rx="17" ry="21" fill="#00ACD7"/>
  <ellipse cx="62" cy="72" rx="10" ry="14" fill="#111" opacity="0.28"/>
  <ellipse cx="138" cy="72" rx="17" ry="21" fill="#00ACD7"/>
  <ellipse cx="138" cy="72" rx="10" ry="14" fill="#111" opacity="0.28"/>

  <!-- Head — slightly taller than wide, Go proportions -->
  <ellipse cx="100" cy="96" rx="54" ry="56" fill="#00ACD7"/>

  <!-- Eyes — large, clean, not exaggerated -->
  <ellipse cx="80" cy="86" rx="18" ry="19" fill="white"/>
  <ellipse cx="120" cy="86" rx="18" ry="19" fill="white"/>
  <!-- Iris -->
  <circle cx="81" cy="88" r="11" fill="url(#iris-l)"/>
  <circle cx="119" cy="88" r="11" fill="url(#iris-r)"/>
  <!-- Pupil -->
  <circle cx="82" cy="89" r="5.5" fill="#0a1a22"/>
  <circle cx="120" cy="89" r="5.5" fill="#0a1a22"/>
  <!-- Specular -->
  <circle cx="85" cy="84" r="3" fill="white" opacity="0.9"/>
  <circle cx="123" cy="84" r="3" fill="white" opacity="0.9"/>

  <!-- Muzzle — flatter, more proportional -->
  <ellipse cx="100" cy="118" rx="30" ry="20" fill="#9DD8E5"/>
  <!-- Nose — two small nostrils, not one blob -->
  <circle cx="94" cy="109" r="4" fill="#0a2530"/>
  <circle cx="106" cy="109" r="4" fill="#0a2530"/>
  <!-- Philtrum line -->
  <line x1="100" y1="113" x2="100" y2="119" stroke="#7ABFCF" stroke-width="1.5" opacity="0.5"/>

  <!-- Neck / body stub -->
  <ellipse cx="100" cy="155" rx="32" ry="18" fill="#00ACD7"/>

  <!-- ── WRENCH badge (bottom-right corner of icon) ── -->
  <circle cx="155" cy="155" r="30" fill="#111111"/>
  <circle cx="155" cy="155" r="30" fill="#f59e0b" fill-opacity="0.07"/>
  <circle cx="155" cy="155" r="29" stroke="#f59e0b" stroke-opacity="0.25" stroke-width="1" fill="none"/>
  <!-- Wrench shape -->
  <path d="M165 143 a8.5 8.5 0 0 0-9.5 11.5 l-8.5 8.5 a3 3 0 1 0 4.2 4.2 l8.5-8.5 a8.5 8.5 0 0 0 11.5-9.5 l-4.5 4.5 -3.2-3.2 4.5-4.5z"
        fill="#f59e0b"/>
</svg>
