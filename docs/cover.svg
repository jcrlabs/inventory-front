<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <radialGradient id="amber-center" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wrench-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="soft-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="wrench-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="800" height="1100" fill="url(#bg-grad)"/>
  <rect width="800" height="1100" fill="url(#amber-center)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#f59e0b" opacity="0.06"/>
  </pattern>
  <rect width="800" height="1100" fill="url(#dots)"/>

  <!-- Outer border -->
  <rect x="32" y="32" width="736" height="1036" rx="16"
        stroke="#f59e0b" stroke-width="1" stroke-opacity="0.1" fill="none"/>


  <!-- ── LOGOMARK (centered, upper third) ── -->
  <g transform="translate(400, 252)">
    <!-- Outer ring glow -->
    <circle cx="0" cy="0" r="88" fill="#f59e0b" fill-opacity="0.04" filter="url(#soft-glow)"/>
    <!-- Ring -->
    <circle cx="0" cy="0" r="80" fill="#161616"
            stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.2"/>

    <!-- ── GOPHER holding wrench ── -->

    <!-- Body -->
    <ellipse cx="2" cy="22" rx="25" ry="31" fill="#5BBECB"/>
    <!-- Head -->
    <circle cx="2" cy="-14" r="25" fill="#5BBECB"/>

    <!-- Ears outer -->
    <ellipse cx="-14" cy="-36" rx="7.5" ry="9.5" fill="#5BBECB"/>
    <ellipse cx="18" cy="-36" rx="7.5" ry="9.5" fill="#5BBECB"/>
    <!-- Ears inner -->
    <ellipse cx="-14" cy="-36" rx="4.5" ry="6.5" fill="#2d7a87"/>
    <ellipse cx="18" cy="-36" rx="4.5" ry="6.5" fill="#2d7a87"/>

    <!-- Snout -->
    <ellipse cx="2" cy="-7" rx="11" ry="8" fill="#8FD8E0"/>

    <!-- Eyes -->
    <circle cx="-8" cy="-21" r="7.5" fill="white"/>
    <circle cx="12" cy="-21" r="7.5" fill="white"/>
    <circle cx="-7.5" cy="-21" r="4.5" fill="#111827"/>
    <circle cx="12.5" cy="-21" r="4.5" fill="#111827"/>
    <!-- Eye shine -->
    <circle cx="-5.5" cy="-23" r="1.8" fill="white"/>
    <circle cx="14.5" cy="-23" r="1.8" fill="white"/>

    <!-- Nose -->
    <ellipse cx="2" cy="-5" rx="2.5" ry="1.8" fill="#111827"/>

    <!-- Belly lighter -->
    <ellipse cx="2" cy="22" rx="17" ry="24" fill="#8FD8E0" opacity="0.4"/>

    <!-- Left arm (relaxed) -->
    <path d="M-23 8 Q-36 2 -42 -3" stroke="#5BBECB" stroke-width="9" stroke-linecap="round" fill="none"/>
    <!-- Left paw -->
    <circle cx="-42" cy="-3" r="5.5" fill="#5BBECB"/>

    <!-- Right arm (holding wrench up) -->
    <path d="M27 8 Q38 0 42 -8" stroke="#5BBECB" stroke-width="9" stroke-linecap="round" fill="none"/>

    <!-- Wrench in right hand (scaled, rotated) -->
    <g transform="translate(36, -22) scale(0.40) rotate(-20)">
      <path d="M28 -44a28 28 0 0 0-31.3 37.8L-26 17.4a10 10 0 1 0 14.1 14.1L11.7 8.1A28 28 0 0 0 48.5 -23.2l-16.2 16.2-10.8-10.8 16.2-16.2z"
            fill="url(#wrench-fill)" filter="url(#wrench-glow)"/>
      <circle cx="-18" cy="24" r="6.5" fill="#7c2d12"/>
      <circle cx="-18" cy="24" r="3.5" fill="#111" opacity="0.6"/>
    </g>

    <!-- Feet -->
    <ellipse cx="-7" cy="53" rx="9" ry="5.5" fill="#4AAAB7"/>
    <ellipse cx="14" cy="53" rx="9" ry="5.5" fill="#4AAAB7"/>
  </g>


  <!-- ── TITLE ── -->
  <text x="400" y="412"
        font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="86" font-weight="800"
        fill="white" text-anchor="middle" letter-spacing="-3">Electroteca</text>

  <!-- Amber accent line under title -->
  <rect x="308" y="428" width="184" height="2.5" rx="1.25"
        fill="#f59e0b" opacity="0.55"/>


  <!-- ── SUBTITLE ── -->
  <text x="400" y="472"
        font-family="Inter, -apple-system, sans-serif"
        font-size="19" font-weight="400"
        fill="#71717a" text-anchor="middle" letter-spacing="0.2">
    Sistema de gestión de reparaciones
  </text>


  <!-- ── DIVIDER (more space from title area) ── -->
  <line x1="80" y1="595" x2="720" y2="595"
        stroke="#27272a" stroke-width="1"/>


  <!-- ── TECH STACK ── -->
  <!-- Row 1 -->
  <g font-family="Inter, monospace" font-size="12" font-weight="600" text-anchor="middle">

    <g transform="translate(118, 649)">
      <rect x="-38" y="-16" width="76" height="30" rx="6"
            fill="#00ACD7" fill-opacity="0.08" stroke="#00ACD7" stroke-opacity="0.2" stroke-width="1"/>
      <text y="5" fill="#00ACD7">Go · Gin</text>
    </g>

    <g transform="translate(218, 649)">
      <rect x="-34" y="-16" width="68" height="30" rx="6"
            fill="#00ACD7" fill-opacity="0.06" stroke="#00ACD7" stroke-opacity="0.14" stroke-width="1"/>
      <text y="5" fill="#4FC3D9">GORM</text>
    </g>

    <g transform="translate(318, 649)">
      <rect x="-44" y="-16" width="88" height="30" rx="6"
            fill="#336791" fill-opacity="0.1" stroke="#336791" stroke-opacity="0.22" stroke-width="1"/>
      <text y="5" fill="#6FA8D0">PostgreSQL</text>
    </g>

    <g transform="translate(432, 649)">
      <rect x="-34" y="-16" width="68" height="30" rx="6"
            fill="#C72C48" fill-opacity="0.08" stroke="#C72C48" stroke-opacity="0.2" stroke-width="1"/>
      <text y="5" fill="#E05572">MinIO</text>
    </g>

    <g transform="translate(524, 649)">
      <rect x="-36" y="-16" width="72" height="30" rx="6"
            fill="#61DAFB" fill-opacity="0.07" stroke="#61DAFB" stroke-opacity="0.2" stroke-width="1"/>
      <text y="5" fill="#61DAFB">React</text>
    </g>

    <g transform="translate(622, 649)">
      <rect x="-44" y="-16" width="88" height="30" rx="6"
            fill="#3178C6" fill-opacity="0.08" stroke="#3178C6" stroke-opacity="0.2" stroke-width="1"/>
      <text y="5" fill="#6B9FEF">TypeScript</text>
    </g>

  </g>

  <!-- Row 2 -->
  <g font-family="Inter, monospace" font-size="12" font-weight="600" text-anchor="middle">

    <g transform="translate(152, 701)">
      <rect x="-36" y="-16" width="72" height="30" rx="6"
            fill="#646CFF" fill-opacity="0.07" stroke="#646CFF" stroke-opacity="0.18" stroke-width="1"/>
      <text y="5" fill="#9096FF">Vite</text>
    </g>

    <g transform="translate(248, 701)">
      <rect x="-40" y="-16" width="80" height="30" rx="6"
            fill="#06B6D4" fill-opacity="0.07" stroke="#06B6D4" stroke-opacity="0.18" stroke-width="1"/>
      <text y="5" fill="#22D3EE">Tailwind</text>
    </g>

    <g transform="translate(362, 701)">
      <rect x="-46" y="-16" width="92" height="30" rx="6"
            fill="#326CE5" fill-opacity="0.08" stroke="#326CE5" stroke-opacity="0.2" stroke-width="1"/>
      <text y="5" fill="#6B9FEF">Kubernetes</text>
    </g>

    <g transform="translate(476, 701)">
      <rect x="-38" y="-16" width="76" height="30" rx="6"
            fill="#EF7B4D" fill-opacity="0.08" stroke="#EF7B4D" stroke-opacity="0.2" stroke-width="1"/>
      <text y="5" fill="#EF7B4D">ArgoCD</text>
    </g>

    <g transform="translate(578, 701)">
      <rect x="-30" y="-16" width="60" height="30" rx="6"
            fill="#4F5BD5" fill-opacity="0.08" stroke="#4F5BD5" stroke-opacity="0.18" stroke-width="1"/>
      <text y="5" fill="#8B91EF">Helm</text>
    </g>

    <g transform="translate(660, 701)">
      <rect x="-30" y="-16" width="60" height="30" rx="6"
            fill="#ffffff" fill-opacity="0.04" stroke="#fff" stroke-opacity="0.1" stroke-width="1"/>
      <text y="5" fill="#71717a">GHCR</text>
    </g>

  </g>


  <!-- ── BOTTOM SECTION ── -->
  <line x1="80" y1="828" x2="720" y2="828"
        stroke="#27272a" stroke-width="1"/>

  <!-- Author -->
  <text x="400" y="882"
        font-family="Inter, -apple-system, sans-serif"
        font-size="17" font-weight="600"
        fill="#a1a1aa" text-anchor="middle" letter-spacing="0.2">
    Jonathan Caamaño Riveiro
  </text>

  <text x="400" y="916"
        font-family="Inter, -apple-system, sans-serif"
        font-size="13" font-weight="400"
        fill="#52525b" text-anchor="middle" letter-spacing="0.5">
    DAW · 2026
  </text>

  <!-- Corner marks -->
  <path d="M32 110 L32 48 Q32 32 48 32 L110 32"
        stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.22" fill="none"/>
  <path d="M768 110 L768 48 Q768 32 752 32 L690 32"
        stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.22" fill="none"/>
  <path d="M32 990 L32 1052 Q32 1068 48 1068 L110 1068"
        stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.22" fill="none"/>
  <path d="M768 990 L768 1052 Q768 1068 752 1068 L690 1068"
        stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.22" fill="none"/>
</svg>
