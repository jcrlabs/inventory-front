<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <radialGradient id="amber-glow" cx="50%" cy="22%" r="45%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wrench-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="wrench-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="hex-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="800" height="1100" fill="url(#bg-grad)"/>
  <rect width="800" height="1100" fill="url(#amber-glow)"/>

  <!-- Dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#f59e0b" opacity="0.055"/>
  </pattern>
  <rect width="800" height="1100" fill="url(#dots)"/>

  <!-- Outer border -->
  <rect x="32" y="32" width="736" height="1036" rx="16"
        stroke="#f59e0b" stroke-width="1" stroke-opacity="0.1" fill="none"/>


  <!-- ── LOGOMARK — Hexagon (K8s ref) + wrench (repair) + circuit nodes ── -->
  <g transform="translate(400, 205)">

    <!-- Glow halo -->
    <polygon points="0,-75 64.95,-37.5 64.95,37.5 0,75 -64.95,37.5 -64.95,-37.5"
             fill="#f59e0b" fill-opacity="0.05" filter="url(#hex-glow)"/>

    <!-- Hexagon face -->
    <polygon points="0,-68 58.9,-34 58.9,34 0,68 -58.9,34 -58.9,-34"
             fill="#111111"/>

    <!-- Hexagon stroke -->
    <polygon points="0,-68 58.9,-34 58.9,34 0,68 -58.9,34 -58.9,-34"
             fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.28"/>

    <!-- Circuit nodes at each vertex -->
    <circle cx="0"     cy="-68"  r="3.5" fill="#f59e0b" opacity="0.45"/>
    <circle cx="58.9"  cy="-34"  r="3.5" fill="#f59e0b" opacity="0.45"/>
    <circle cx="58.9"  cy="34"   r="3.5" fill="#f59e0b" opacity="0.45"/>
    <circle cx="0"     cy="68"   r="3.5" fill="#f59e0b" opacity="0.45"/>
    <circle cx="-58.9" cy="34"   r="3.5" fill="#f59e0b" opacity="0.45"/>
    <circle cx="-58.9" cy="-34"  r="3.5" fill="#f59e0b" opacity="0.45"/>

    <!-- Short circuit traces from midpoints of sides (tech detail) -->
    <line x1="29.45" y1="-51" x2="29.45" y2="-60" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.18"/>
    <line x1="58.9"  y1="0"   x2="68"   y2="0"   stroke="#f59e0b" stroke-width="1" stroke-opacity="0.18"/>
    <line x1="-58.9" y1="0"   x2="-68"  y2="0"   stroke="#f59e0b" stroke-width="1" stroke-opacity="0.18"/>
    <line x1="29.45" y1="51"  x2="29.45" y2="60"  stroke="#f59e0b" stroke-width="1" stroke-opacity="0.18"/>

    <!-- Wrench — centered inside hexagon -->
    <g transform="translate(-8, 4) scale(0.7)" filter="url(#wrench-glow)">
      <path d="M28 -44a28 28 0 0 0-31.3 37.8L-26 17.4a10 10 0 1 0 14.1 14.1L11.7 8.1A28 28 0 0 0 48.5 -23.2l-16.2 16.2-10.8-10.8 16.2-16.2z"
            fill="url(#wrench-fill)"/>
      <circle cx="-18" cy="24" r="6.5" fill="#7c2d12"/>
      <circle cx="-18" cy="24" r="3.5" fill="#0a0a0a" opacity="0.6"/>
    </g>

  </g>


  <!-- ── TITLE ── -->
  <text x="400" y="342"
        font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="86" font-weight="800"
        fill="white" text-anchor="middle" letter-spacing="-3">Electroteca</text>

  <!-- Amber accent line -->
  <rect x="308" y="357" width="184" height="2.5" rx="1.25"
        fill="#f59e0b" opacity="0.55"/>

  <!-- ── SUBTITLE ── -->
  <text x="400" y="396"
        font-family="Inter, -apple-system, sans-serif"
        font-size="19" font-weight="400"
        fill="#52525b" text-anchor="middle" letter-spacing="0.2">
    Sistema de gestión de reparaciones
  </text>


  <!-- ── DIVIDER ── -->
  <line x1="80" y1="438" x2="720" y2="438"
        stroke="#27272a" stroke-width="1"/>


  <!-- ── TECH STACK — 3 rows of 4, compact ── -->
  <g font-family="Inter, monospace" font-size="12" font-weight="600" text-anchor="middle">

    <!-- Row 1 -->
    <g transform="translate(130, 479)">
      <rect x="-40" y="-16" width="80" height="30" rx="6"
            fill="#00ACD7" fill-opacity="0.08" stroke="#00ACD7" stroke-opacity="0.22" stroke-width="1"/>
      <text y="5" fill="#00ACD7">Go · Gin</text>
    </g>
    <g transform="translate(283, 479)">
      <rect x="-36" y="-16" width="72" height="30" rx="6"
            fill="#00ACD7" fill-opacity="0.06" stroke="#00ACD7" stroke-opacity="0.15" stroke-width="1"/>
      <text y="5" fill="#4FC3D9">GORM</text>
    </g>
    <g transform="translate(450, 479)">
      <rect x="-46" y="-16" width="92" height="30" rx="6"
            fill="#336791" fill-opacity="0.1" stroke="#336791" stroke-opacity="0.22" stroke-width="1"/>
      <text y="5" fill="#6FA8D0">PostgreSQL</text>
    </g>
    <g transform="translate(628, 479)">
      <rect x="-36" y="-16" width="72" height="30" rx="6"
            fill="#C72C48" fill-opacity="0.08" stroke="#C72C48" stroke-opacity="0.2" stroke-width="1"/>
      <text y="5" fill="#E05572">MinIO</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(130, 523)">
      <rect x="-38" y="-16" width="76" height="30" rx="6"
            fill="#61DAFB" fill-opacity="0.07" stroke="#61DAFB" stroke-opacity="0.2" stroke-width="1"/>
      <text y="5" fill="#61DAFB">React</text>
    </g>
    <g transform="translate(283, 523)">
      <rect x="-46" y="-16" width="92" height="30" rx="6"
            fill="#3178C6" fill-opacity="0.08" stroke="#3178C6" stroke-opacity="0.2" stroke-width="1"/>
      <text y="5" fill="#6B9FEF">TypeScript</text>
    </g>
    <g transform="translate(450, 523)">
      <rect x="-36" y="-16" width="72" height="30" rx="6"
            fill="#646CFF" fill-opacity="0.07" stroke="#646CFF" stroke-opacity="0.18" stroke-width="1"/>
      <text y="5" fill="#9096FF">Vite</text>
    </g>
    <g transform="translate(628, 523)">
      <rect x="-42" y="-16" width="84" height="30" rx="6"
            fill="#06B6D4" fill-opacity="0.07" stroke="#06B6D4" stroke-opacity="0.18" stroke-width="1"/>
      <text y="5" fill="#22D3EE">Tailwind</text>
    </g>

    <!-- Row 3 -->
    <g transform="translate(130, 567)">
      <rect x="-48" y="-16" width="96" height="30" rx="6"
            fill="#326CE5" fill-opacity="0.08" stroke="#326CE5" stroke-opacity="0.2" stroke-width="1"/>
      <text y="5" fill="#6B9FEF">Kubernetes</text>
    </g>
    <g transform="translate(283, 567)">
      <rect x="-40" y="-16" width="80" height="30" rx="6"
            fill="#EF7B4D" fill-opacity="0.08" stroke="#EF7B4D" stroke-opacity="0.2" stroke-width="1"/>
      <text y="5" fill="#EF7B4D">ArgoCD</text>
    </g>
    <g transform="translate(450, 567)">
      <rect x="-32" y="-16" width="64" height="30" rx="6"
            fill="#4F5BD5" fill-opacity="0.08" stroke="#4F5BD5" stroke-opacity="0.18" stroke-width="1"/>
      <text y="5" fill="#8B91EF">Helm</text>
    </g>
    <g transform="translate(628, 567)">
      <rect x="-32" y="-16" width="64" height="30" rx="6"
            fill="#ffffff" fill-opacity="0.04" stroke="#fff" stroke-opacity="0.1" stroke-width="1"/>
      <text y="5" fill="#71717a">GHCR</text>
    </g>

  </g>

  <!-- ── DIVIDER after stack ── -->
  <line x1="80" y1="605" x2="720" y2="605"
        stroke="#27272a" stroke-width="1"/>


  <!-- ── FOOTER — muy abajo ── -->
  <text x="400" y="1032"
        font-family="Inter, -apple-system, sans-serif"
        font-size="16" font-weight="600"
        fill="#71717a" text-anchor="middle" letter-spacing="0.3">
    Jonathan Caamaño Riveiro
  </text>
  <text x="400" y="1058"
        font-family="Inter, -apple-system, sans-serif"
        font-size="12" font-weight="400"
        fill="#3f3f46" text-anchor="middle" letter-spacing="0.8">
    DAW · 2026
  </text>

  <!-- Corner marks -->
  <path d="M32 110 L32 48 Q32 32 48 32 L110 32"
        stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.22" fill="none"/>
  <path d="M768 110 L768 48 Q768 32 752 32 L690 32"
        stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.22" fill="none"/>
  <path d="M32 990 L32 1052 Q32 1068 48 1068 L110 1068"
        stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.22" fill="none"/>
  <path d="M768 990 L768 1052 Q768 1068 752 1068 L690 1068"
        stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.22" fill="none"/>
</svg>
